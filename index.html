<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Brickbound Demo + GB Studio Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="frame">
        <header class="hud">
          <div>
            <span class="label">Game</span>
            <strong>Brickbound</strong>
          </div>
          <div>
            <span class="label">Run</span>
            <strong id="distance">0m</strong>
          </div>
          <div>
            <span class="label">Cores</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">State</span>
            <strong id="status">Ready</strong>
          </div>
        </header>
        <canvas id="game" width="960" height="540" aria-label="Brickbound playable demo"></canvas>
        <div class="legend">
          <span>Arrow keys or touch to move</span>
          <span>`Z` / tap jump to leap</span>
          <span>Reach the beacon</span>
        </div>
        <div class="legend legend-links">
          <span><a href="./guide.html">Read the GB Studio guide</a></span>
          <span><a href="./gbstudio-mario-guide-2026-03-28.pdf" download>Download the PDF</a></span>
          <span>Publish future GB Studio web exports at <code>/play/v1/</code></span>
        </div>
      </section>

      <section class="touch-ui" aria-label="Touch controls">
        <button class="touch-btn" data-action="left">◀</button>
        <button class="touch-btn touch-jump" data-action="jump">▲</button>
        <button class="touch-btn" data-action="right">▶</button>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
